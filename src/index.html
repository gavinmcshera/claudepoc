<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Learning Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #2a034c;
            --navy-light: #451284;
            --coral: #00ca9f;
            --coral-light: rgba(0, 202, 159, 0.1);
            --coral-dark: #005559;
            --white: #FFFFFF;
            --off-white: #E2E2F2;
            --mid-grey: #616172;
            --border: #E2E2F2;
            --text: #414156;
            --nav-height: 64px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html {
            scroll-behavior: smooth;
            scroll-padding-top: calc(var(--nav-height) + 32px);
        }

        body {
            font-family: calibri, sans-serif;
            color: var(--text);
            background: var(--white);
            line-height: 1.7;
            font-size: 16px;
        }

        /* ── NAV ── */
        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: var(--nav-height);
            background: var(--navy);
            z-index: 100;
            display: flex;
            align-items: center;
            padding: 0 24px 0 32px;
            gap: 0;
        }

        .nav-logo {
            font-family: 'Montserrat', Arial, sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: var(--white);
            text-decoration: none;
            margin-right: 32px;
            white-space: nowrap;
        }

        .nav-links {
            display: flex;
            gap: 2px;
            list-style: none;
            overflow-x: auto;
            flex: 1;
        }

        .nav-links a {
            text-decoration: none;
            color: rgba(255,255,255,0.7);
            font-size: 13px;
            font-weight: 500;
            padding: 6px 11px;
            border-radius: 6px;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--coral);
            background: rgba(0,202,159,0.12);
        }

        /* ── NAV SEARCH ── */
        .nav-search {
            margin-left: 16px;
            position: relative;
            flex-shrink: 0;
        }

        .nav-search svg {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            width: 14px;
            height: 14px;
            fill: none;
            stroke: rgba(255,255,255,0.5);
            stroke-width: 2;
            pointer-events: none;
        }

        .nav-search input {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            padding: 7px 14px 7px 30px;
            color: white;
            font-family: calibri, sans-serif;
            font-size: 13px;
            width: 170px;
            outline: none;
            transition: all 0.2s;
        }

        .nav-search input::placeholder { color: rgba(255,255,255,0.45); }

        .nav-search input:focus {
            background: rgba(255,255,255,0.15);
            border-color: var(--coral);
            width: 220px;
        }

        /* ── MOBILE TOGGLE ── */
        .nav-toggle {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            margin-left: 8px;
        }

        .nav-toggle span {
            display: block;
            width: 22px;
            height: 2px;
            background: var(--white);
            margin: 5px 0;
        }

        /* ── PROGRESS BAR ── */
        #progress-bar {
            position: fixed;
            top: var(--nav-height);
            left: 0;
            height: 3px;
            width: 0%;
            background: var(--coral);
            z-index: 99;
            transition: width 0.08s linear;
        }

        /* ── SEARCH NO RESULTS ── */
        #no-results {
            display: none;
            text-align: center;
            padding: 60px 24px;
            color: var(--mid-grey);
            font-size: 16px;
        }

        /* ── LAYOUT ── */
        .container {
            max-width: 780px;
            margin: 0 auto;
            padding: 0 24px;
        }

        main {
            padding-top: calc(var(--nav-height) + 3px);
            padding-bottom: 80px;
        }

        /* ── HERO ── */
        .hero {
            background: linear-gradient(135deg, #451284 0%, #2a034c 100%);
            padding: 80px 24px 64px;
            margin: 0 -24px 48px;
            color: var(--white);
        }

        .hero .container-inner { max-width: 780px; margin: 0 auto; }

        .hero h1 {
            font-family: 'Montserrat', Arial, sans-serif;
            font-size: 44px;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 16px;
            letter-spacing: -0.5px;
        }

        .hero p {
            font-size: 18px;
            color: rgba(255,255,255,0.75);
            max-width: 600px;
            font-weight: 300;
        }

        .hero .badge {
            display: inline-block;
            background: var(--coral);
            color: var(--navy);
            font-size: 12px;
            font-weight: 700;
            padding: 5px 14px;
            border-radius: 4px;
            margin-bottom: 24px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* ── SECTIONS ── */
        section { margin-bottom: 56px; }

        section h2 {
            font-family: 'Montserrat', Arial, sans-serif;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 6px;
            padding-top: 8px;
            color: var(--navy);
        }

        section .section-intro {
            color: var(--mid-grey);
            margin-bottom: 28px;
            font-size: 16px;
        }

        section h3 {
            font-family: 'Montserrat', Arial, sans-serif;
            font-size: 17px;
            font-weight: 600;
            margin: 36px 0 10px;
            color: var(--navy);
        }

        section h3:first-of-type { margin-top: 24px; }
        section p { margin-bottom: 14px; }

        /* ── CARDS ── */
        .card-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin: 20px 0;
        }

        .card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 22px;
        }

        .card h4 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--navy);
        }

        .card p, .card ul {
            font-size: 14px;
            color: var(--mid-grey);
            margin-bottom: 0;
            line-height: 1.6;
        }

        .card ul { list-style: none; padding: 0; }

        .card ul li { padding: 3px 0 3px 16px; position: relative; }

        .card ul li::before {
            content: "\2022";
            position: absolute;
            left: 0;
            color: var(--coral);
        }

        .card.full-width { grid-column: 1 / -1; }

        /* ── PROMPT EXAMPLES ── */
        .prompt-example {
            position: relative;
            background: var(--navy);
            color: rgba(255,255,255,0.9);
            border-radius: 8px;
            padding: 22px 80px 22px 22px;
            margin: 14px 0;
            font-size: 14px;
            line-height: 1.7;
            overflow-x: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .prompt-example .label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .prompt-example .label.bad { color: #F87171; }
        .prompt-example .label.good { color: #6EE7B7; }
        .prompt-example .label.neutral { color: #FCD34D; }

        /* ── COPY BUTTON ── */
        .copy-btn {
            position: absolute;
            top: 14px;
            right: 14px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: rgba(255,255,255,0.65);
            padding: 4px 10px;
            border-radius: 4px;
            font-family: calibri, sans-serif;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }

        .copy-btn:hover {
            background: rgba(255,255,255,0.18);
            color: white;
        }

        .copy-btn.copied {
            background: rgba(0,202,159,0.2);
            border-color: var(--coral);
            color: var(--coral);
        }

        /* ── TIPS ── */
        .tip {
            background: var(--coral-light);
            border-left: 3px solid var(--coral);
            border-radius: 0 8px 8px 0;
            padding: 18px 22px;
            margin: 20px 0;
            font-size: 15px;
        }

        .tip strong {
            display: block;
            margin-bottom: 4px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--coral-dark);
            font-weight: 600;
        }

        .tip.info { background: var(--off-white); border-left-color: var(--navy-light); }
        .tip.info strong { color: var(--navy-light); }

        /* ── HOLDING NOTICE ── */
        .holding-notice {
            background: var(--off-white);
            border: 1px dashed var(--border);
            border-radius: 8px;
            padding: 32px;
            text-align: center;
            margin: 20px 0;
        }

        .holding-notice .icon { font-size: 28px; margin-bottom: 12px; }
        .holding-notice h4 { font-size: 16px; font-weight: 600; margin-bottom: 8px; color: var(--navy); }
        .holding-notice p { color: var(--mid-grey); font-size: 14px; margin-bottom: 0; margin-top: 8px; }

        /* ── DO / DON'T ── */
        .do-dont {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin: 20px 0;
        }

        .do-col, .dont-col {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 22px;
        }

        .do-col h4 {
            color: var(--coral);
            font-size: 13px; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .dont-col h4 {
            color: #b502b1;
            font-size: 13px; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .do-col li, .dont-col li {
            font-size: 14px; margin-bottom: 8px; color: var(--mid-grey);
            list-style: none; padding-left: 18px; position: relative;
        }

        .do-col li::before { content: "\2713"; color: var(--coral); position: absolute; left: 0; font-weight: 700; }
        .dont-col li::before { content: "\2717"; color: #b502b1; position: absolute; left: 0; font-weight: 700; }

        /* ── STEPS ── */
        .steps { counter-reset: step; list-style: none; margin: 20px 0; }

        .steps li {
            counter-increment: step;
            padding: 14px 14px 14px 54px;
            position: relative;
            margin-bottom: 8px;
            background: var(--off-white);
            border-radius: 8px;
            font-size: 15px;
        }

        .steps li::before {
            content: counter(step);
            position: absolute;
            left: 16px; top: 14px;
            width: 26px; height: 26px;
            background: var(--coral);
            color: var(--white);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; font-weight: 600;
        }

        /* ── COMPARE TABLE ── */
        .compare-table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            font-size: 14px;
        }

        .compare-table th {
            text-align: left;
            padding: 12px 16px;
            background: var(--navy);
            color: var(--white);
            font-weight: 500;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .compare-table td {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            color: var(--mid-grey);
            vertical-align: top;
        }

        .compare-table tr:last-child td { border-bottom: none; }

        /* ── DIVIDER ── */
        .divider { height: 1px; background: var(--border); margin: 56px 0; }

        /* ── FOOTER ── */
        footer {
            background: var(--navy);
            padding: 32px 0;
            text-align: center;
            font-size: 13px;
            color: rgba(255,255,255,0.5);
        }

        #loading {
            text-align: center;
            padding: 80px 24px;
            color: var(--mid-grey);
        }

        /* ── EXTERNAL LINKS BAR ── */
        .learn-more-bar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 6px 20px;
            padding: 12px 16px;
            background: var(--off-white);
            border-radius: 6px;
            margin: 16px 0;
            font-size: 13px;
        }

        .learn-more-bar span {
            font-weight: 600;
            color: var(--mid-grey);
        }

        .learn-more-bar a {
            color: var(--coral-dark);
            text-decoration: none;
            font-weight: 600;
            font-size: 13px;
        }

        .learn-more-bar a:hover {
            color: var(--coral);
            text-decoration: underline;
        }

        /* ── MOBILE ── */
        @media (max-width: 780px) {
            .nav-links { display: none; }
            .nav-search { display: none; }
            .nav-links.open {
                display: flex;
                flex-direction: column;
                position: fixed;
                top: var(--nav-height);
                left: 0; right: 0;
                background: var(--navy);
                border-bottom: 1px solid var(--navy-light);
                padding: 16px 24px;
                gap: 4px;
            }
            .nav-toggle { display: block; }
            .hero h1 { font-size: 30px; }
            .card-grid, .do-dont { grid-template-columns: 1fr; }
            .prompt-example { padding-right: 22px; }
            .copy-btn { display: none; }
        }
    </style>
</head>
<body>

<div id="progress-bar"></div>

<nav>
    <a href="#top" class="nav-logo">Claude Learning Hub</a>
    <ul class="nav-links" id="navLinks">
        <li><a href="#getting-started">Getting Started</a></li>
        <li><a href="#prompting">Prompting</a></li>
        <li><a href="#projects">Projects &amp; Files</a></li>
        <li><a href="#excel-pptx">Excel &amp; PowerPoint</a></li>
        <li><a href="#connectors">Connectors</a></li>
        <li><a href="#cowork">Cowork</a></li>
        <li><a href="#guidelines">Guidelines</a></li>
        <li><a href="#feedback">Feedback</a></li>
    </ul>
    <div class="nav-search">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <circle cx="11" cy="11" r="7"></circle>
            <line x1="16.5" y1="16.5" x2="22" y2="22"></line>
        </svg>
        <input type="text" id="searchInput" placeholder="Search..." autocomplete="off" />
    </div>
    <button class="nav-toggle" id="navToggle" aria-label="Menu">
        <span></span><span></span><span></span>
    </button>
</nav>

<main id="top">
    <div class="container">
        <div id="loading">Loading...</div>
        <div id="app" style="display:none"></div>
        <div id="no-results">No results found for "<span id="search-term"></span>"</div>
    </div>
</main>

<footer>
    <div class="container" id="footer-text">
        Claude Learning Hub &middot; Pilot Program &middot; Internal use only
    </div>
</footer>

<script>
// ── Escape helpers ───────────────────────────────────────────────

function esc(str) {
    if (!str) return '';
    return String(str)
        .replace(/&(?!(amp|lt|gt|quot|#);)/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
}

function escAttr(str) {
    if (!str) return '';
    return String(str).replace(/&/g, '&amp;').replace(/"/g, '&quot;');
}

function safe(str) { return str || ''; }

// ── Render helpers ───────────────────────────────────────────────

function renderSteps(steps) {
    if (!steps || !steps.length) return '';
    return `<ol class="steps">${steps.map(s => `<li>${safe(s)}</li>`).join('')}</ol>`;
}

function renderCards(cards) {
    if (!cards || !cards.length) return '';
    return `<div class="card-grid">${cards.map(c => `
        <div class="card">
            <h4>${esc(c.title)}</h4>
            ${c.items
                ? `<ul>${c.items.map(i => `<li>${esc(i)}</li>`).join('')}</ul>`
                : `<p>${safe(c.body)}</p>`}
        </div>`).join('')}</div>`;
}

function renderTip(tip, type) {
    if (!tip || !tip.label) return '';
    return `<div class="tip ${type || ''}"><strong>${esc(tip.label)}</strong>${esc(tip.body)}</div>`;
}

function renderTipRaw(label, body, type) {
    if (!label) return '';
    return `<div class="tip ${type || ''}"><strong>${esc(label)}</strong>${esc(body)}</div>`;
}

function renderPrompt(p) {
    return `<div class="prompt-example" data-body="${escAttr(p.body)}"><span class="label ${esc(p.type)}">${esc(p.title)}</span><button class="copy-btn" type="button">Copy</button>${esc(p.body)}</div>`;
}

function renderPrompts(prompts) {
    if (!prompts || !prompts.length) return '';
    return prompts.map(renderPrompt).join('');
}

function renderHoldingNotice(heading, p1, p2) {
    return `<div class="holding-notice">
        <div class="icon">&#128274;</div>
        <h4>${esc(heading)}</h4>
        <p>${esc(p1)}</p>
        ${p2 ? `<p>${esc(p2)}</p>` : ''}
    </div>`;
}

function renderDivider() { return '<div class="divider"></div>'; }

// ── Section renderers ────────────────────────────────────────────

function renderHero(d) {
    return `<div class="hero">
        <div class="container-inner">
            <div class="badge">${esc(d.badge)}</div>
            <h1>${esc(d.heading)}</h1>
            <p>${esc(d.subheading)}</p>
        </div>
    </div>`;
}

function renderGettingStarted(d) {
    const modelsCards = d.models_cards ? renderCards(d.models_cards) : '';
    const thinkingTip = d.thinking_tip ? renderTip(d.thinking_tip) : '';
    const prefExample = d.preferences_example_body ? `<div class="prompt-example" data-body="${escAttr(d.preferences_example_body)}"><span class="label good">${esc(d.preferences_example_title || 'Example')}</span><button class="copy-btn" type="button">Copy</button>${esc(d.preferences_example_body)}</div>` : '';
    const prefTip = d.preferences_tip ? renderTip(d.preferences_tip) : '';

    return `<section id="getting-started">
        <h2>${esc(d.heading)}</h2>
        <p class="section-intro">${esc(d.intro)}</p>
        ${renderSteps(d.steps)}
        <h3>The interface at a glance</h3>
        ${renderCards(d.cards)}
        ${renderTip(d.tip)}
        <h3>Your first conversation</h3>
        <p>Start with something real from your day-to-day work. It's most useful when given a genuine task with real context.</p>
        ${renderPrompts(d.prompts)}
        <div class="learn-more-bar">
            <span>Anthropic Academy:</span>
            <a href="https://anthropic.skilljar.com/claude-101" target="_blank" rel="noopener">Claude 101 course →</a>
            <a href="https://support.claude.com/en/articles/12997377-getting-started-with-claude-ai" target="_blank" rel="noopener">Official getting started guide →</a>
        </div>
        ${d.models_heading ? `<h3>${esc(d.models_heading)}</h3>` : ''}
        ${d.models_intro ? `<p>${esc(d.models_intro)}</p>` : ''}
        ${modelsCards}
        <div class="learn-more-bar">
            <a href="https://claude.com/resources/tutorials/getting-the-most-out-of-sonnet-4-5-in-claude-ai" target="_blank" rel="noopener">Get the most from Sonnet →</a>
            <a href="https://claude.com/resources/tutorials/get-the-most-from-claude-opus-4-6" target="_blank" rel="noopener">Get the most from Opus →</a>
        </div>
        ${d.thinking_heading ? `<h3>${esc(d.thinking_heading)}</h3>` : ''}
        ${d.thinking_body ? `<p>${esc(d.thinking_body)}</p>` : ''}
        ${thinkingTip}
        ${d.preferences_heading ? `<h3>${esc(d.preferences_heading)}</h3>` : ''}
        ${d.preferences_why ? `<p>${esc(d.preferences_why)}</p>` : ''}
        ${renderSteps(d.preferences_steps)}
        ${prefExample}
        ${prefTip}
    </section>`;
}

function renderPrompting(d) {
    const patterns = (d.patterns || []).map(p => `
        <h3>${esc(p.heading)}</h3>
        <p>${esc(p.body)}</p>
        ${p.tip_label ? renderTipRaw(p.tip_label, p.tip_body) : ''}
        ${renderPrompts(p.examples)}`).join('');

    const cards = (d.prompt_cards || []).map(c =>
        `<div class="card"><h4>${esc(c.title)}</h4><p>${esc(c.body)}</p></div>`
    ).join('');

    return `<section id="prompting">
        <h2>${esc(d.heading)}</h2>
        <p class="section-intro">${esc(d.intro)}</p>
        ${patterns}
        <h3>${esc(d.prompt_cards_heading)}</h3>
        <div class="card-grid">${cards}</div>
        <div class="learn-more-bar">
            <a href="https://claude.com/resources/use-cases" target="_blank" rel="noopener">Explore more Claude use cases on anthropic.com →</a>
        </div>
    </section>`;
}

function renderProjects(d) {
    const tableRows = (d.comparison_rows || []).map(r =>
        `<tr><td>${esc(r.regular)}</td><td>${esc(r.project)}</td></tr>`
    ).join('');

    const examples = (d.instruction_examples || []).map(e =>
        `<div class="prompt-example" data-body="${escAttr(e.body)}"><span class="label good">${esc(e.title)}</span><button class="copy-btn" type="button">Copy</button>${esc(e.body)}</div>`
    ).join('');

    return `<section id="projects">
        <h2>${esc(d.heading)}</h2>
        <p class="section-intro">${esc(d.intro)}</p>
        <h3>What is a Project?</h3>
        <p>${esc(d.what_is_it)}</p>
        <h3>When to use a Project vs a regular chat</h3>
        <table class="compare-table">
            <thead><tr><th>Use a regular chat when...</th><th>Use a Project when...</th></tr></thead>
            <tbody>${tableRows}</tbody>
        </table>
        <h3>Setting up a Project</h3>
        ${renderSteps(d.steps)}
        <h3>Writing good Project Instructions</h3>
        <p>Project Instructions are the most powerful and underused feature. Write them once, benefit every time.</p>
        ${examples}
        <h3>Project ideas</h3>
        ${renderCards(d.idea_cards)}

// ── Load and render ──────────────────────────────────────────────

async function loadAll() {
    const files = [
        'hero','getting-started','prompting','projects',
        'excel-pptx','connectors','cowork','guidelines','feedback'
    ];

    try {
        const results = await Promise.all(
            files.map(f => fetch(`/data/${f}.json`).then(r => {
                if (!r.ok) throw new Error(`Failed to load ${f}.json`);
                return r.json();
            }))
        );

        const [hero, gs, prompting, projects, excel, connectors, cowork, guidelines, feedback] = results;

        const html = [
            renderHero(hero),
            renderGettingStarted(gs),
            renderDivider(),
            renderPrompting(prompting),
            renderDivider(),
            renderProjects(projects),
            renderDivider(),
            renderExcelPptx(excel),
            renderDivider(),
            renderConnectors(connectors),
            renderDivider(),
            renderCowork(cowork),
            renderDivider(),
            renderGuidelines(guidelines),
            renderDivider(),
            renderFeedback(feedback)
        ].join('');

        document.getElementById('loading').style.display = 'none';
        const app = document.getElementById('app');
        app.style.display = 'block';
        app.innerHTML = html;

        if (hero.last_updated) {
            document.getElementById('footer-text').innerHTML =
                `Claude Learning Hub &middot; Pilot Program &middot; Internal use only &middot; Updated ${esc(hero.last_updated)}`;
        }

        initNav();
        initCopy();
        initSearch();

    } catch (err) {
        document.getElementById('loading').textContent = 'Error loading content. Please refresh.';
        console.error(err);
    }
}

// ── Nav ──────────────────────────────────────────────────────────

function initNav() {
    const toggle = document.getElementById('navToggle');
    const links = document.getElementById('navLinks');
    toggle.addEventListener('click', () => links.classList.toggle('open'));
    links.querySelectorAll('a').forEach(a => {
        a.addEventListener('click', () => links.classList.remove('open'));
    });

    const navAnchors = document.querySelectorAll('.nav-links a');
    function highlightNav() {
        const sections = document.querySelectorAll('section[id]');
        let current = '';
        sections.forEach(s => {
            if (window.scrollY >= s.offsetTop - 120) current = s.id;
        });
        navAnchors.forEach(a => {
            a.classList.toggle('active', a.getAttribute('href') === '#' + current);
        });
    }
    window.addEventListener('scroll', highlightNav, { passive: true });
    highlightNav();
}

// ── Progress bar ─────────────────────────────────────────────────

window.addEventListener('scroll', function() {
    const scrollTop = window.scrollY;
    const docHeight = document.documentElement.scrollHeight - window.innerHeight;
    const pct = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
    document.getElementById('progress-bar').style.width = pct + '%';
}, { passive: true });

// ── Copy buttons ─────────────────────────────────────────────────

function initCopy() {
    document.addEventListener('click', function(e) {
        const btn = e.target.closest('.copy-btn');
        if (!btn) return;
        const body = btn.closest('.prompt-example').dataset.body || '';
        const copy = (text) => {
            btn.textContent = 'Copied ✓';
            btn.classList.add('copied');
            setTimeout(() => {
                btn.textContent = 'Copy';
                btn.classList.remove('copied');
            }, 2000);
        };
        if (navigator.clipboard) {
            navigator.clipboard.writeText(body).then(() => copy()).catch(() => fallbackCopy(body, copy));
        } else {
            fallbackCopy(body, copy);
        }
    });
}

function fallbackCopy(text, callback) {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;opacity:0';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); callback(); } catch(e) {}
    document.body.removeChild(ta);
}

// ── Search ───────────────────────────────────────────────────────

function initSearch() {
    const input = document.getElementById('searchInput');
    const noResults = document.getElementById('no-results');
    const term = document.getElementById('search-term');

    input.addEventListener('input', function() {
        const q = this.value.trim().toLowerCase();

        if (!q) {
            document.querySelectorAll('section, .divider').forEach(el => el.style.display = '');
            noResults.style.display = 'none';
            return;
        }

        term.textContent = this.value.trim();
        let anyVisible = false;

        document.querySelectorAll('section[id]').forEach(s => {
            // Search against headings, labels, and card titles only — not full body text
            const targets = [...s.querySelectorAll('h2, h3, h4, .label, .section-intro')];
            const searchable = targets.map(el => el.textContent).join(' ').toLowerCase();
            const matches = searchable.includes(q);
            s.style.display = matches ? '' : 'none';
            if (matches) anyVisible = true;
        });

        document.querySelectorAll('.divider').forEach(d => {
            const prev = d.previousElementSibling;
            const next = d.nextElementSibling;
            const prevHidden = prev && prev.style.display === 'none';
            const nextHidden = next && next.style.display === 'none';
            d.style.display = (prevHidden || nextHidden) ? 'none' : '';
        });

        noResults.style.display = anyVisible ? 'none' : 'block';
    });
}

loadAll();
</script>
