<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Learning Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #2a034c;
            --navy-light: #451284;
            --coral: #00ca9f;
            --coral-light: rgba(0, 202, 159, 0.1);
            --coral-dark: #005559;
            --white: #FFFFFF;
            --off-white: #E2E2F2;
            --light-grey: #E2E2F2;
            --mid-grey: #616172;
            --border: #E2E2F2;
            --text: #414156;
            --nav-height: 64px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html {
            scroll-behavior: smooth;
            scroll-padding-top: calc(var(--nav-height) + 32px);
        }

        body {
            font-family: calibri, sans-serif;
            color: var(--text);
            background: var(--white);
            line-height: 1.7;
            font-size: 16px;
            font-weight: 400;
        }

        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: var(--nav-height);
            background: var(--navy);
            z-index: 100;
            display: flex;
            align-items: center;
            padding: 0 32px;
        }

        .nav-logo {
            font-family: 'Montserrat', Arial, sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: var(--white);
            text-decoration: none;
            margin-right: 48px;
            white-space: nowrap;
            letter-spacing: 0.5px;
        }

        .nav-links {
            display: flex;
            gap: 4px;
            list-style: none;
            overflow-x: auto;
        }

        .nav-links a {
            text-decoration: none;
            color: rgba(255, 255, 255, 0.7);
            font-size: 13.5px;
            font-weight: 500;
            padding: 6px 14px;
            border-radius: 6px;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--coral);
            background: rgba(0, 202, 159, 0.12);
        }

        .nav-toggle {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            margin-left: auto;
        }

        .nav-toggle span {
            display: block;
            width: 22px;
            height: 2px;
            background: var(--white);
            margin: 5px 0;
            transition: 0.3s;
        }

        .container {
            max-width: 780px;
            margin: 0 auto;
            padding: 0 24px;
        }

        main {
            padding-top: var(--nav-height);
            padding-bottom: 80px;
        }

        .hero {
            background: linear-gradient(135deg, #451284 0%, #2a034c 100%);
            padding: 80px 24px 64px;
            margin: 0 -24px 48px;
            color: var(--white);
        }

        .hero .container-inner {
            max-width: 780px;
            margin: 0 auto;
        }

        .hero h1 {
            font-family: 'Montserrat', Arial, sans-serif;
            font-size: 44px;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 16px;
            letter-spacing: -0.5px;
        }

        .hero p {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.75);
            max-width: 600px;
            font-weight: 300;
        }

        .hero .badge {
            display: inline-block;
            background: var(--coral);
            color: var(--navy);
            font-size: 12px;
            font-weight: 700;
            padding: 5px 14px;
            border-radius: 4px;
            margin-bottom: 24px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        section { margin-bottom: 56px; }

        section h2 {
            font-family: 'Montserrat', Arial, sans-serif;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 6px;
            padding-top: 8px;
            color: var(--navy);
        }

        section .section-intro {
            color: var(--mid-grey);
            margin-bottom: 28px;
            font-size: 16px;
        }

        section h3 {
            font-family: 'Montserrat', Arial, sans-serif;
            font-size: 17px;
            font-weight: 600;
            margin: 36px 0 10px;
            color: var(--navy);
        }

        section h3:first-of-type { margin-top: 24px; }

        section p { margin-bottom: 14px; }

        .card-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin: 20px 0;
        }

        .card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 22px;
        }

        .card h4 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--navy);
        }

        .card p, .card ul {
            font-size: 14px;
            color: var(--mid-grey);
            margin-bottom: 0;
            line-height: 1.6;
        }

        .card ul { list-style: none; padding: 0; }

        .card ul li {
            padding: 3px 0 3px 16px;
            position: relative;
        }

        .card ul li::before {
            content: "\2022";
            position: absolute;
            left: 0;
            color: var(--coral);
        }

        .card.full-width { grid-column: 1 / -1; }

        .prompt-example {
            background: var(--navy);
            color: rgba(255, 255, 255, 0.9);
            border-radius: 8px;
            padding: 22px;
            margin: 14px 0;
            font-size: 14px;
            line-height: 1.7;
            overflow-x: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .prompt-example .label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            margin-bottom: 10px;
            display: block;
        }

        .prompt-example .label.bad { color: #F87171; }
        .prompt-example .label.good { color: #6EE7B7; }
        .prompt-example .label.neutral { color: #FCD34D; }

        .tip {
            background: var(--coral-light);
            border-left: 3px solid var(--coral);
            border-radius: 0 8px 8px 0;
            padding: 18px 22px;
            margin: 20px 0;
            font-size: 15px;
        }

        .tip strong {
            display: block;
            margin-bottom: 4px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--coral-dark);
            font-weight: 600;
        }

        .tip.info {
            background: var(--off-white);
            border-left-color: var(--navy-light);
        }

        .tip.info strong { color: var(--navy-light); }

        .holding-notice {
            background: var(--off-white);
            border: 1px dashed var(--border);
            border-radius: 8px;
            padding: 32px;
            text-align: center;
            margin: 20px 0;
        }

        .holding-notice .icon { font-size: 28px; margin-bottom: 12px; }
        .holding-notice h4 { font-size: 16px; font-weight: 600; margin-bottom: 8px; color: var(--navy); }
        .holding-notice p { color: var(--mid-grey); font-size: 14px; margin-bottom: 0; margin-top: 8px; }

        .do-dont {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin: 20px 0;
        }

        .do-col, .dont-col {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 22px;
        }

        .do-col h4 {
            color: var(--coral);
            font-size: 13px; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .dont-col h4 {
            color: #b502b1;
            font-size: 13px; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .do-col li, .dont-col li {
            font-size: 14px; margin-bottom: 8px; color: var(--mid-grey);
            list-style: none; padding-left: 18px; position: relative;
        }

        .do-col li::before { content: "\2713"; color: var(--coral); position: absolute; left: 0; font-weight: 700; }
        .dont-col li::before { content: "\2717"; color: #b502b1; position: absolute; left: 0; font-weight: 700; }

        .steps {
            counter-reset: step;
            list-style: none;
            margin: 20px 0;
        }

        .steps li {
            counter-increment: step;
            padding: 14px 14px 14px 54px;
            position: relative;
            margin-bottom: 8px;
            background: var(--off-white);
            border-radius: 8px;
            font-size: 15px;
        }

        .steps li::before {
            content: counter(step);
            position: absolute;
            left: 16px; top: 14px;
            width: 26px; height: 26px;
            background: var(--coral);
            color: var(--white);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; font-weight: 600;
        }

        .compare-table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            font-size: 14px;
        }

        .compare-table th {
            text-align: left;
            padding: 12px 16px;
            background: var(--navy);
            color: var(--white);
            font-weight: 500;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .compare-table td {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            color: var(--mid-grey);
            vertical-align: top;
        }

        .compare-table tr:last-child td { border-bottom: none; }

        .divider {
            height: 1px;
            background: var(--border);
            margin: 56px 0;
        }

        footer {
            background: var(--navy);
            padding: 32px 0;
            text-align: center;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
        }

        #loading {
            text-align: center;
            padding: 80px 24px;
            color: var(--mid-grey);
            font-size: 16px;
        }

        @media (max-width: 700px) {
            .nav-links { display: none; }
            .nav-links.open {
                display: flex;
                flex-direction: column;
                position: fixed;
                top: var(--nav-height);
                left: 0; right: 0;
                background: var(--navy);
                border-bottom: 1px solid var(--navy-light);
                padding: 16px 24px;
                gap: 4px;
            }
            .nav-toggle { display: block; }
            .hero h1 { font-size: 30px; }
            .card-grid, .do-dont { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<nav>
    <a href="#top" class="nav-logo">Claude Learning Hub</a>
    <ul class="nav-links" id="navLinks">
        <li><a href="#getting-started">Getting Started</a></li>
        <li><a href="#prompting">Prompting</a></li>
        <li><a href="#projects">Projects &amp; Files</a></li>
        <li><a href="#excel-pptx">Excel &amp; PowerPoint</a></li>
        <li><a href="#connectors">Connectors</a></li>
        <li><a href="#cowork">Cowork</a></li>
        <li><a href="#guidelines">Guidelines</a></li>
        <li><a href="#feedback">Feedback</a></li>
    </ul>
    <button class="nav-toggle" id="navToggle" aria-label="Menu">
        <span></span><span></span><span></span>
    </button>
</nav>

<main id="top">
    <div class="container">
        <div id="loading">Loading...</div>
        <div id="app" style="display:none"></div>
    </div>
</main>

<footer>
    <div class="container">
        Claude Learning Hub &middot; Pilot Program &middot; Internal use only
    </div>
</footer>

<script>
// ── Render helpers ───────────────────────────────────────────────

function esc(str) {
    if (!str) return '';
    return String(str)
        .replace(/&(?!amp;|lt;|gt;|quot;|#)/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
}

function safe(str) {
    // Use for fields that may contain intentional HTML (like <strong> in steps)
    return str || '';
}

function renderSteps(steps) {
    if (!steps || !steps.length) return '';
    return `<ol class="steps">${steps.map(s => `<li>${safe(s)}</li>`).join('')}</ol>`;
}

function renderCards(cards) {
    if (!cards || !cards.length) return '';
    return `<div class="card-grid">${cards.map(c => `
        <div class="card">
            <h4>${esc(c.title)}</h4>
            ${c.items
                ? `<ul>${c.items.map(i => `<li>${esc(i)}</li>`).join('')}</ul>`
                : `<p>${safe(c.body)}</p>`
            }
        </div>
    `).join('')}</div>`;
}

function renderTip(tip, type) {
    if (!tip || !tip.label) return '';
    return `<div class="tip ${type || ''}"><strong>${esc(tip.label)}</strong>${esc(tip.body)}</div>`;
}

function renderTipObj(label, body, type) {
    if (!label) return '';
    return `<div class="tip ${type || ''}"><strong>${esc(label)}</strong>${esc(body)}</div>`;
}

function renderPrompt(p) {
    return `<div class="prompt-example"><span class="label ${esc(p.type)}">${esc(p.title)}</span>${esc(p.body)}</div>`;
}

function renderPrompts(prompts) {
    if (!prompts || !prompts.length) return '';
    return prompts.map(renderPrompt).join('');
}

function renderHoldingNotice(heading, p1, p2) {
    return `
        <div class="holding-notice">
            <div class="icon">&#128274;</div>
            <h4>${esc(heading)}</h4>
            <p>${esc(p1)}</p>
            ${p2 ? `<p>${esc(p2)}</p>` : ''}
        </div>`;
}

function renderDivider() {
    return '<div class="divider"></div>';
}

// ── Section renderers ────────────────────────────────────────────

function renderHero(d) {
    return `
        <div class="hero">
            <div class="container-inner">
                <div class="badge">${esc(d.badge)}</div>
                <h1>${esc(d.heading)}</h1>
                <p>${esc(d.subheading)}</p>
            </div>
        </div>`;
}

function renderGettingStarted(d) {
    return `
        <section id="getting-started">
            <h2>${esc(d.heading)}</h2>
            <p class="section-intro">${esc(d.intro)}</p>
            ${renderSteps(d.steps)}
            <h3>The interface at a glance</h3>
            ${renderCards(d.cards)}
            ${renderTip(d.tip)}
            <h3>Your first conversation</h3>
            <p>Start with something real from your day-to-day work. Don't test Claude with trivia. It's most useful when given a genuine task with real context.</p>
            ${renderPrompts(d.prompts)}
        </section>`;
}

function renderPrompting(d) {
    const patterns = (d.patterns || []).map(p => `
        <h3>${esc(p.heading)}</h3>
        <p>${esc(p.body)}</p>
        ${p.tip_label ? renderTipObj(p.tip_label, p.tip_body) : ''}
        ${renderPrompts(p.examples)}
    `).join('');

    const cards = (d.prompt_cards || []).map(c => `
        <div class="card"><h4>${esc(c.title)}</h4><p>${esc(c.body)}</p></div>
    `).join('');

    return `
        <section id="prompting">
            <h2>${esc(d.heading)}</h2>
            <p class="section-intro">${esc(d.intro)}</p>
            ${patterns}
            <h3>${esc(d.prompt_cards_heading)}</h3>
            <div class="card-grid">${cards}</div>
        </section>`;
}

function renderProjects(d) {
    const tableRows = (d.comparison_rows || []).map(r =>
        `<tr><td>${esc(r.regular)}</td><td>${esc(r.project)}</td></tr>`
    ).join('');

    const instructionExamples = (d.instruction_examples || []).map(e =>
        `<div class="prompt-example"><span class="label good">${esc(e.title)}</span>${esc(e.body)}</div>`
    ).join('');

    return `
        <section id="projects">
            <h2>${esc(d.heading)}</h2>
            <p class="section-intro">${esc(d.intro)}</p>
            <h3>What is a Project?</h3>
            <p>${esc(d.what_is_it)}</p>
            <h3>When to use a Project vs a regular chat</h3>
            <table class="compare-table">
                <thead><tr><th>Use a regular chat when...</th><th>Use a Project when...</th></tr></thead>
                <tbody>${tableRows}</tbody>
            </table>
            <h3>Setting up a Project</h3>
            ${renderSteps(d.steps)}
            <h3>Writing good Project Instructions</h3>
            <p>Project Instructions are the most powerful and underused feature. Write them once, benefit every time.</p>
            ${instructionExamples}
            <h3>Project ideas</h3>
            ${renderCards(d.idea_cards)}
            <h3>File uploads</h3>
            ${renderCards(d.file_cards)}
        </section>`;
}

function renderExcelPptx(d) {
    const excelExamples = (d.excel_examples || []).map(group => `
        <h3>${esc(group.subheading)}</h3>
        ${renderPrompts(group.prompts)}
    `).join('');

    const pptxExamples = (d.pptx_examples || []).map(group => `
        <h3>${esc(group.subheading)}</h3>
        ${renderPrompts(group.prompts)}
    `).join('');

    return `
        <section id="excel-pptx">
            <h2>${esc(d.heading)}</h2>
            <p class="section-intro">${esc(d.intro)}</p>
            <h3>Claude for Excel</h3>
            ${renderSteps(d.excel_steps)}
            ${excelExamples}
            <h3>Claude for PowerPoint</h3>
            ${renderSteps(d.pptx_steps)}
            ${pptxExamples}
            ${renderTip(d.tip)}
        </section>`;
}

function renderConnectors(d) {
    return `
        <section id="connectors">
            <h2>${esc(d.heading)}</h2>
            <p class="section-intro">${esc(d.intro)}</p>
            ${renderHoldingNotice(d.notice_heading, d.notice_p1, d.notice_p2)}
        </section>`;
}

function renderCowork(d) {
    return `
        <section id="cowork">
            <h2>${esc(d.heading)}</h2>
            <p class="section-intro">${esc(d.intro)}</p>
            ${renderHoldingNotice(d.notice_heading, d.notice_p1, d.notice_p2)}
        </section>`;
}

function renderGuidelines(d) {
    const doItems = (d.do_items || []).map(i => `<li>${esc(i)}</li>`).join('');
    const dontItems = (d.dont_items || []).map(i => `<li>${esc(i)}</li>`).join('');
    const tips = (d.tips || []).map(t => renderTipObj(t.label, t.body, t.type)).join('');

    return `
        <section id="guidelines">
            <h2>${esc(d.heading)}</h2>
            <p class="section-intro">${esc(d.intro)}</p>
            <div class="do-dont">
                <div class="do-col"><h4>Appropriate use</h4><ul>${doItems}</ul></div>
                <div class="dont-col"><h4>Not appropriate</h4><ul>${dontItems}</ul></div>
            </div>
            <h3>Accuracy and hallucination</h3>
            <p>${esc(d.hallucination_intro)}</p>
            ${renderCards(d.risk_cards)}
            ${tips}
        </section>`;
}

function renderFeedback(d) {
    return `
        <section id="feedback">
            <h2>${esc(d.heading)}</h2>
            <p class="section-intro">${esc(d.intro)}</p>
            ${renderCards(d.cards)}
            <p>${esc(d.body)}</p>
            ${renderTipObj('Note', d.note)}
        </section>`;
}

// ── Load and render ──────────────────────────────────────────────

async function loadAll() {
    const files = [
        'hero', 'getting-started', 'prompting', 'projects',
        'excel-pptx', 'connectors', 'cowork', 'guidelines', 'feedback'
    ];

    try {
        const results = await Promise.all(
            files.map(f => fetch(`/data/${f}.json`).then(r => r.json()))
        );

        const [hero, gs, prompting, projects, excel, connectors, cowork, guidelines, feedback] = results;

        const html = [
            renderHero(hero),
            renderGettingStarted(gs),
            renderDivider(),
            renderPrompting(prompting),
            renderDivider(),
            renderProjects(projects),
            renderDivider(),
            renderExcelPptx(excel),
            renderDivider(),
            renderConnectors(connectors),
            renderDivider(),
            renderCowork(cowork),
            renderDivider(),
            renderGuidelines(guidelines),
            renderDivider(),
            renderFeedback(feedback)
        ].join('');

        document.getElementById('loading').style.display = 'none';
        const app = document.getElementById('app');
        app.style.display = 'block';
        app.innerHTML = html;

        initNav();

    } catch (err) {
        document.getElementById('loading').textContent = 'Error loading content. Please refresh.';
        console.error(err);
    }
}

function initNav() {
    const toggle = document.getElementById('navToggle');
    const links = document.getElementById('navLinks');
    toggle.addEventListener('click', () => links.classList.toggle('open'));
    links.querySelectorAll('a').forEach(a => {
        a.addEventListener('click', () => links.classList.remove('open'));
    });

    const navAnchors = document.querySelectorAll('.nav-links a');
    function highlightNav() {
        const sections = document.querySelectorAll('section[id]');
        let current = '';
        sections.forEach(s => {
            if (window.scrollY >= s.offsetTop - 120) current = s.id;
        });
        navAnchors.forEach(a => {
            a.classList.toggle('active', a.getAttribute('href') === '#' + current);
        });
    }
    window.addEventListener('scroll', highlightNav);
    highlightNav();
}

loadAll();
</script>

</body>
</html>
